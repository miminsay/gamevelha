<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF‑8">
<title>Jogo da Velha LOONA OT12</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1b0b2c;
        font-family: Arial, sans-serif;
        color: white;
    }
    h1 {
        font-size: 36px;
        color: #d40ce8;
        margin-bottom: 18px;
    }
    #board {
        display: grid;
        grid-template-columns: repeat(3, 110px);
        grid-template-rows: repeat(3, 110px);
        gap: 6px;
    }
    .cell {
        width: 110px;
        height: 110px;
        background: #0d021a;
        border: 3px solid #9b3cff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
    .cell img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
    }
    #reset {
        margin-top: 22px;
        padding: 10px 24px;
        background: #9b3cff;
        font-size: 16px;
        border: none;
        cursor: pointer;
        color: white;
        border-radius: 6px;
    }
</style>
</head>
<body>

<h1>🟣 Jogo da Velha LOONA OT12</h1>
<div id="board"></div>
<button id="reset">🔄 Reiniciar</button>

<script>
const board = document.getElementById('board');
const resetBtn = document.getElementById('reset');
let turn = 'X';
let gameOver = false;

// URLs de imagens de cada integrante (12 garotas)
const pics = [
  "https://i.pinimg.com/564x/4c/1a/ab/4c1aabbcfec7513bb77eb2b8a6624554.jpg", // HeeJin
  "https://i.pinimg.com/564x/b2/b2/1f/b2b21f04db510f918bea67364225b9e4.jpg", // HyunJin
  "https://i.pinimg.com/564x/da/56/e9/da56e9dfb5399bc138a37d03d47ae3f7.jpg", // HaSeul
  "https://i.pinimg.com/564x/96/0f/2c/960f2c0a7d2189e50e54f9ee0b94d9fc.jpg", // YeoJin
  "https://i.pinimg.com/564x/55/da/2e/55da2e2189d650b1b8f22b28c8db3a82.jpg", // ViVi
  "https://i.pinimg.com/564x/50/2c/4f/502c4f32094de5f8585ef176586fee78.jpg", // Kim Lip
  "https://i.pinimg.com/564x/53/ae/1a/53ae1a5fc95dfdb1a378d67f96abb7f1.jpg", // JinSoul
  "https://i.pinimg.com/564x/3d/85/f4/3d85f4c0b8f1b9a1bc948577d2052644.jpg", // Choerry
  "https://i.pinimg.com/564x/e9/03/2e/e9032e5074a7c21d952f4a09fa74b41c.jpg", // Yves
  "https://i.pinimg.com/564x/49/3d/9a/493d9a5d406c7fbbcd2bd0c17f960a70.jpg", // Chuu
  "https://i.pinimg.com/564x/2b/2f/07/2b2f076e71f50f0dd58561ef99efd354.jpg", // Go Won
  "https://i.pinimg.com/564x/60/67/76/606776c9e1ae16a368d8985a4b98477a.jpg"  // Olivia Hye
];

// criar tabuleiro
for(let i=0; i<9; i++){
    const cell = document.createElement('div');
    cell.className = "cell";
    cell.addEventListener('click', () => play(cell));
    board.appendChild(cell);
}

function play(cell){
    if(cell.innerHTML || gameOver) return;
    const img = document.createElement("img");

    // escolhe aleatório da lista inteira pra cada jogada
    img.src = pics[Math.floor(Math.random()*pics.length)];
    cell.appendChild(img);
    checkWin();
    turn = turn === 'X' ? 'O' : 'X';
}

function checkWin(){
    const cells = document.querySelectorAll('.cell');
    const combos = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    for(const c of combos){
        const [a,b,c2] = c;
        if(cells[a].innerHTML &&
           cells[a].innerHTML === cells[b].innerHTML &&
           cells[a].innerHTML === cells[c2].innerHTML){
            setTimeout(() => alert(${turn} venceu! 🏆), 100);
            gameOver = true;
            return;
        }
    }
    if([...cells].every(c => c.innerHTML !== "")){
        setTimeout(() => alert("Empate! 🤝"), 100);
        gameOver = true;
    }
}

resetBtn.addEventListener('click', () => {
    document.querySelectorAll('.cell').forEach(c => c.innerHTML = "");
    turn = 'X';
    gameOver = false;
});
</script>

</body>
</html>
