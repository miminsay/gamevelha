<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Velha LOONA</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #fdf6ff;
        font-family: Arial, sans-serif;
    }
    h1 {
        margin-bottom: 20px;
        color: #a23beb;
    }
    #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
    }
    .cell {
        width: 100px;
        height: 100px;
        background: #fff;
        border: 2px solid #a23beb;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
    .cell img {
        max-width: 90%;
        max-height: 90%;
    }
    #reset {
        margin-top: 20px;
        padding: 10px 20px;
        background: #a23beb;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        border-radius: 5px;
    }
</style>
</head>
<body>

<h1>Jogo da Velha LOONA</h1>
<div id="board"></div>
<button id="reset">Reiniciar</button>

<script>
const board = document.getElementById('board');
const resetBtn = document.getElementById('reset');
let turn = 'X'; // X começa
let gameOver = false;

// URLs de imagens das LOONA (exemplo, pode trocar)
const images = {
    'X': 'https://i.imgur.com/loonaX.png', // substitui por imagem real
    'O': 'https://i.imgur.com/loonaO.png'
};

// criar células
for(let i=0; i<9; i++){
    const cell = document.createElement('div');
    cell.classList.add('cell');
    cell.dataset.index = i;
    cell.addEventListener('click', () => makeMove(cell));
    board.appendChild(cell);
}

// fazer jogada
function makeMove(cell){
    if(cell.innerHTML !== '' || gameOver) return;
    const img = document.createElement('img');
    img.src = images[turn];
    cell.appendChild(img);
    checkWinner();
    turn = turn === 'X' ? 'O' : 'X';
}

// verificar vencedor
function checkWinner(){
    const cells = document.querySelectorAll('.cell');
    const combos = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    for(const combo of combos){
        const [a,b,c] = combo;
        if(cells[a].innerHTML && cells[a].innerHTML === cells[b].innerHTML && cells[a].innerHTML === cells[c].innerHTML){
            alert(turn + ' venceu!');
            gameOver = true;
            return;
        }
    }
    if([...cells].every(c => c.innerHTML !== '')){
        alert('Empate!');
        gameOver = true;
    }
}

// reiniciar jogo
resetBtn.addEventListener('click', () => {
    document.querySelectorAll('.cell').forEach(c => c.innerHTML = '');
    turn = 'X';
    gameOver = false;
});
</script>

</body>
</html>
