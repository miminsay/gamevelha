<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Pou</title>
<style>
body{
  background:#f7f3f0;
  font-family:Arial;
  text-align:center;
}
h1{margin-top:20px;}
#pou{
  width:150px;
  height:150px;
  background:#d18c56;
  border-radius:50%;
  margin:20px auto;
  position:relative;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.olho{
  width:25px;
  height:25px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:40px;
}
.olho.esquerdo{left:35px;}
.olho.direito{right:35px;}
.boca{
  width:50px;
  height:20px;
  background:red;
  border-radius:0 0 25px 25px;
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
}
button{
  padding:10px 15px;
  margin:5px;
  font-size:16px;
  cursor:pointer;
  border:none;
  border-radius:8px;
}
#stats{
  margin-top:20px;
  font-size:18px;
}
</style>
</head>
<body>

<h1>🐾 Mini Pou</h1>

<div id="pou">
  <div class="olho esquerdo"></div>
  <div class="olho direito"></div>
  <div class="boca"></div>
</div>

<div>
  <button onclick="alimentar()">🍎 Comer</button>
  <button onclick="banho()">🛁 Banho</button>
  <button onclick="dormir()">💤 Dormir</button>
  <button onclick="brincar()">⚽ Brincar</button>
</div>

<div id="stats">
  Fome: <span id="fome">50</span> |  
  Limpeza: <span id="limpeza">50</span> |  
  Energia: <span id="energia">50</span> |  
  Felicidade: <span id="felicidade">50</span>
</div>

<script>
let fome=50, limpeza=50, energia=50, felicidade=50

function atualizar(){
  document.getElementById("fome").textContent=fome
  document.getElementById("limpeza").textContent=limpeza
  document.getElementById("energia").textContent=energia
  document.getElementById("felicidade").textContent=felicidade
}

// ações
function alimentar(){
  fome=Math.min(fome+20,100)
  felicidade=Math.min(felicidade+10,100)
  energia=Math.min(energia+5,100)
  atualizar()
}

function banho(){
  limpeza=Math.min(limpeza+30,100)
  felicidade=Math.min(felicidade+5,100)
  atualizar()
}

function dormir(){
  energia=Math.min(energia+40,100)
  fome=Math.max(fome-10,0)
  atualizar()
}

function brincar(){
  felicidade=Math.min(felicidade+20,100)
  energia=Math.max(energia-15,0)
  fome=Math.max(fome-10,0)
  limpeza=Math.max(limpeza-5,0)
  atualizar()
}

// perda de stats com o tempo
setInterval(()=>{
  fome=Math.max(fome-1,0)
  limpeza=Math.max(limpeza-0.5,0)
  energia=Math.max(energia-0.5,0)
  felicidade=Math.max(felicidade-0.5,0)
  atualizar()
},3000)

atualizar()
</script>

</body>
</html>
